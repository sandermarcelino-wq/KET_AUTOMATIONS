<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>Ad — Apartamento de Luxo Bairro X</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="ad-container">

    <!-- Camada 1: imagem de fundo -->
    <div class="ad-bg"></div>

    <!-- Camada 2: gradiente de escurecimento -->
    <div class="ad-gradient"></div>

    <!-- Camada 3: vignette nas bordas -->
    <div class="ad-vignette"></div>

    <!-- Camada 4: conteúdo textual -->
    <div class="ad-content">
      <div class="ad-eyebrow">Bairro X &middot; Lançamento Exclusivo</div>
      <div class="ad-divider"></div>
      <h1 class="ad-headline">
        Você não compra<br>um apartamento.
      </h1>
      <p class="ad-subheadline">Você compra um estilo de vida.</p>
      <p class="ad-cta">Descubra o Bairro X &rarr;</p>
    </div>

  </div>
</body>
</html>
